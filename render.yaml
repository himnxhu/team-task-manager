services:
  - type: web
    name: team-task-manager
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: team-task-manager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DB_SSL
        value: false

databases:
  - name: team-task-manager-db
    plan: free
    databaseName: team_task_manager
    user: team_task_manager
